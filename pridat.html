<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Přidat auto</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    background: #f1f1f1;
    color: #111;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.3s, color 0.3s;
}

body.dark-mode {
    background: #0d0f13;
    color: #f1f1f1;
}

header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(90deg,#0d0f13,#1a1c22,#0d0f13);
    padding: 18px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #c9a24d;
}

header .logo img {
    height: 55px;
}

nav a {
    color: #c9a24d;
    text-decoration: none;
    margin-left: 40px;
    font-weight: 600;
    letter-spacing: 1px;
    position: relative;
}

nav a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -5px;
    width: 0;
    height: 2px;
    background: #c9a24d;
    transition: 0.3s;
}

nav a:hover::after {
    width: 100%;
}

.toggle {
    margin-left: 20px;
    background: none;
    border: 2px solid #c9a24d;
    color: #c9a24d;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 20px;
    font-size: 16px;
}

main {
    flex: 1;
    display: flex;
    justify-content: center;
    padding: 50px 20px;
}

form {
    width: 100%;
    max-width: 600px;
    background: white;
    border-radius: 25px;
    padding: 30px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    gap: 20px;
}

form h2 {
    text-align: center;
    margin-bottom: 20px;
    letter-spacing: 2px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    font-weight: 600;
    margin-bottom: 5px;
}

.form-group input {
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.form-group img {
    margin-top: 10px;
    max-width: 100%;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
}

button[type="submit"] {
    background: #c9a24d;
    color: #111;
    padding: 14px;
    border-radius: 25px;
    border: none;
    font-weight: 600;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

button[type="submit"]:hover {
    background: #e0b85c;
}

footer {
    background: linear-gradient(90deg,#0d0f13,#1a1c22,#0d0f13);
    color: #c9a24d;
    padding: 60px 20px 40px;
    text-align: center;
    border-top: 2px solid #c9a24d;
}

footer img {
    height: 45px;
    margin-bottom: 20px;
}

footer h3 {
    letter-spacing: 3px;
    margin-bottom: 10px;
}

footer p {
    color: #9a9a9a;
    font-size: 14px;
}

body.dark-mode form {
    background: #1a1c22;
    box-shadow: 0 15px 35px rgba(0,0,0,0.6);
}

body.dark-mode .form-group label {
    color: #f1f1f1;
}

body.dark-mode input {
    background: #2a2c33;
    color: #f1f1f1;
    border: 1px solid #555;
}

/* Responzivita pro mobil */
@media (max-width: 500px) {
    form {
        padding: 20px;
    }
}
</style>
</head>
<body>

<header>
    <div class="logo"><img src="logo.png" alt="logo"></div>
    <nav>
        <a href="index.html">ÚVOD</a>
        <a href="pridat.html">PŘIDAT</a>
        <button class="toggle" onclick="toggleMode()">☀ / ☾</button>
    </nav>
</header>

<main>
<form action="/pridat-auto" method="POST">
    <h2>Přidat nové auto</h2>

    <div class="form-group">
        <label for="carImage">URL fotky auta:</label>
        <input type="text" id="carImage" name="carImage" oninput="previewCar(this.value)">
        <img id="carPreview" src="" alt="Náhled auta" style="display:none;">
    </div>

    <div class="form-group">
        <label for="flagImage">URL vlajky:</label>
        <input type="text" id="flagImage" name="flagImage" oninput="previewFlag(this.value)">
        <img id="flagPreview" src="" alt="Náhled vlajky" style="display:none; width:60px; height:auto;">
    </div>

    <div class="form-group">
        <label for="carName">Název auta:</label>
        <input type="text" id="carName" name="carName" required>
    </div>

    <div class="form-group">
        <label for="topSpeed">Max. rychlost (km/h):</label>
        <input type="text" id="topSpeed" name="topSpeed" required>
    </div>

    <div class="form-group">
        <label for="zeroToHundred">0–100 (s):</label>
        <input type="text" id="zeroToHundred" name="zeroToHundred" required>
    </div>

    <div class="form-group">
        <label for="year">Rok výroby:</label>
        <input type="text" id="year" name="year" required>
    </div>

    <button type="submit">Přidat auto</button>
</form>
</main>

<footer>
    <img src="logo.png" alt="logo">
    <h3>Katalog sportovních aut</h3>
    <p>Adam Zdráhal</p>
</footer>

<script>
function toggleMode() {
    document.body.classList.toggle("dark-mode");
}

// Funkce pro náhled fotky auta
function previewCar(url) {
    const img = document.getElementById("carPreview");
    if(url.trim() === "") {
        img.style.display = "none";
    } else {
        img.src = url;
        img.style.display = "block";
    }
}

// Funkce pro náhled vlajky
function previewFlag(url) {
    const img = document.getElementById("flagPreview");
    if(url.trim() === "") {
        img.style.display = "none";
    } else {
        img.src = url;
        img.style.display = "block";
    }
}
</script>

</body>
</html>
