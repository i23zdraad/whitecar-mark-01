<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Přidat auto</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    background: #f1f1f1;
    color: #111;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.3s, color 0.3s;
}

body.dark-mode {
    background: #0d0f13;
    color: #f1f1f1;
}

header {
    position: sticky;
    top: 0;
    background: linear-gradient(90deg,#0d0f13,#1a1c22,#0d0f13);
    padding: 18px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #c9a24d;
}

header .logo img {
    height: 55px;
}

nav a {
    color: #c9a24d;
    text-decoration: none;
    margin-left: 40px;
    font-weight: 600;
}

.toggle {
    margin-left: 20px;
    background: none;
    border: 2px solid #c9a24d;
    color: #c9a24d;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 20px;
}

main {
    flex: 1;
    display: flex;
    justify-content: center;
    padding: 50px 20px;
}

form {
    width: 100%;
    max-width: 600px;
    background: white;
    border-radius: 25px;
    padding: 30px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    gap: 20px;
}

body.dark-mode form {
    background: #1a1c22;
}

form h2 {
    text-align: center;
    margin-bottom: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group input {
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

body.dark-mode input {
    background: #2a2c33;
    color: white;
    border: 1px solid #555;
}

.preview {
    margin-top: 10px;
    max-width: 100%;
    border-radius: 15px;
    display: none;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

button {
    background: #c9a24d;
    color: #111;
    padding: 14px;
    border-radius: 25px;
    border: none;
    font-weight: 600;
    cursor: pointer;
}

button:hover {
    background: #e0b85c;
}

footer {
    background: linear-gradient(90deg, #0d0f13, #1a1c22, #0d0f13);
    color: #c9a24d;
    padding: 60px 20px 40px;
    text-align: center;
    border-top: 2px solid #c9a24d;
}

footer img {
    height: 45px;
    margin-bottom: 20px;
}

footer h3 {
    letter-spacing: 3px;
    margin-bottom: 10px;
}

footer p {
    color: #9a9a9a;
    font-size: 14px;
}
</style>
</head>

<body>

<header>
    <div class="logo"><img src="logo.png" alt="logo"></div>
    <nav>
        <a href="/index.html">ÚVOD</a>
        <a href="/pridat.html">PŘIDAT</a>
        <button class="toggle" onclick="toggleMode()">☀ / ☾</button>
    </nav>
</header>

<main>
<form id="addForm" method="POST" action="/pridat-auto">
    <h2>Přidat nové auto</h2>

    <div class="form-group">
        <label>Název auta</label>
        <input type="text" id="carName" required>
    </div>

    <div class="form-group">
        <label>Max. rychlost (km/h)</label>
        <input type="number" id="topSpeed" required>
    </div>

    <div class="form-group">
        <label>0–100 (s)</label>
        <input type="number" step="0.1" id="zeroToHundred" required>
    </div>

    <div class="form-group">
        <label>Rok výroby</label>
        <input type="number" id="year" required>
    </div>

    <div class="form-group">
        <label>URL fotky auta</label>
        <input type="text" id="carImage" oninput="previewCar()" required>
        <img id="carPreview" class="preview">
    </div>

    <div class="form-group">
        <label>URL vlajky</label>
        <input type="text" id="flagImage" oninput="previewFlag()" required>
        <img id="flagPreview" class="preview" style="max-width:80px;">
    </div>

    <button type="submit">Přidat auto</button>
</form>
</main>
<footer>
    <img src="logo.png" alt=" logo">
    <h3>Katalog sportovních aut</h3>
    <p>Adam Zdráhal</p>
</footer>

<script>
function toggleMode() {
    document.body.classList.toggle("dark-mode");
}

// Náhled auta
function previewCar() {
    const url = document.getElementById("carImage").value;
    const img = document.getElementById("carPreview");
    if(url.trim() === "") {
        img.style.display = "none";
    } else {
        img.src = url;
        img.style.display = "block";
    }
}

// Náhled vlajky
function previewFlag() {
    const url = document.getElementById("flagImage").value;
    const img = document.getElementById("flagPreview");
    if(url.trim() === "") {
        img.style.display = "none";
    } else {
        img.src = url;
        img.style.display = "block";
    }
}

// Odeslání nového auta
document.getElementById("addForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const newCar = {
        nazev: document.getElementById("carName").value,
        rychlost: Number(document.getElementById("topSpeed").value),
        zrychleni: Number(document.getElementById("zeroToHundred").value),
        vyroba: Number(document.getElementById("year").value),
        auto: document.getElementById("carImage").value,
        vlajka: document.getElementById("flagImage").value
    };

    fetch("/pridat-auto", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(newCar)
    })
    .then(res => res.json())
    .then(result => {
        alert(result.message);
        document.getElementById("addForm").reset();
        document.getElementById("carPreview").style.display = "none";
        document.getElementById("flagPreview").style.display = "none";
    })
    .catch(err => {
        alert("Chyba při přidávání auta!");
        console.error(err);
    });
});
</script>

</body>
</html>
