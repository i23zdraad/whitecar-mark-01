<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Smazání položky</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    background: #f1f1f1;
    color: #111;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.confirm-box {
    background: white;
    border-radius: 35px;
    padding: 50px 40px;
    max-width: 480px;
    text-align: center;
    box-shadow: 0 25px 60px rgba(0,0,0,0.2);
}

.confirm-box h1 {
    letter-spacing: 3px;
    margin-bottom: 20px;
}

.confirm-box p {
    color: #666;
    margin-bottom: 35px;
    line-height: 1.6;
}

.buttons {
    display: flex;
    justify-content: center;
    gap: 25px;
}

.buttons button {
    border: none;
    padding: 14px 30px;
    border-radius: 30px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
}

.yes {
    background: #c94d4d;
    color: white;
}

.no {
    background: #ccc;
    color: #111;
}

.yes:hover {
    background: #b13f3f;
}

.no:hover {
    background: #bbb;
}


#toast {
    position: fixed;
    left: 25px;
    bottom: 25px;
    background: #1a1c22;
    color: #c9a24d;
    padding: 14px 22px;
    border-radius: 15px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    font-size: 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
}

#toast.show {
    opacity: 1;
}
</style>
</head>

<body>

<div class="confirm-box">
    <h1>Potvrzení smazání</h1>
    <p>
        Opravdu chceš trvale smazat vybranou položku z katalogu?
        Tuto akci nelze vrátit zpět.
    </p>

    <div class="buttons">
        <button class="yes" onclick="smazat()">ANO, SMAZAT</button>
        <button class="no" onclick="zrusit()">NE, ZRUŠIT</button>
    </div>
</div>

<div id="toast">Položka byla úspěšně smazána</div>

<script>
function smazat() {
    const toast = document.getElementById("toast");
    toast.classList.add("show");

    setTimeout(() => {
        window.location.href = "index.html";
    }, 2000);
}

function zrusit() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
